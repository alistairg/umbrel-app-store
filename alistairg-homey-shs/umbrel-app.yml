description: >-
  Homey Self-Hosted Server lets you run the Homey smart home platform
  on your own hardware. After installing, open the Homey mobile app,
  add a new Homey, and select Self-Hosted Server.
  
  Note: This app uses host networking and privileged mode for Zigbee,
  Z-Wave, Matter, and mDNS device discovery. Configure and control
  via the Homey mobile app on iOS or Android.
