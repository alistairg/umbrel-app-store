services:
  app_proxy:
    environment:
      APP_HOST: alistairg-ultrafeeder_server_1
      APP_PORT: 80

  server:
    image: ghcr.io/sdr-enthusiasts/docker-adsb-ultrafeeder:latest
    restart: unless-stopped
    tmpfs:
      - /run/readsb
      - /var/log
    devices:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - TZ=America/Los_Angeles
      - READSB_LAT=47.5707     # West Seattle — replace when you move
      - READSB_LON=-122.3868
      - READSB_ALT=50m
      - READSB_RX_LOCATION_ACCURACY=2
      - READSB_STATS_RANGE=true
      - UUID=CHANGE_ME_GENERATE_A_UUID
      - ULTRAFEEDER_CONFIG=
          adsb,feed.adsb.fi,30004,beast_reduce_plus_out;
          adsb,in.adsb.lol,30004,beast_reduce_plus_out;
          adsb,feed.adsb.one,64004,beast_reduce_plus_out;
          adsb,feed.planespotters.net,30004,beast_reduce_plus_out;
          adsb,feed.theairtraffic.com,30004,beast_reduce_plus_out;
          mlat,feed.adsb.fi,31090,39000;
          mlat,in.adsb.lol,31090,39001;
          mlat,feed.adsb.one,64006,39002;
          mlat,mlat.planespotters.net,31090,39003;
          mlat,feed.theairtraffic.com,31090,39004
    volumes:
      - ${APP_DATA_DIR}/globe_history:/var/globe_history
      - ${APP_DATA_DIR}/graphs1090:/var/lib/collectd